name: Deploy to Azure VM (Simple)

on:
  workflow_dispatch:

env:
  VM_HOST: ${{ secrets.VM_HOST }}
  VM_USER: azureuser

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy project files
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude 'db.sqlite3' \
            --exclude '.env' \
            --exclude '.env.prod' \
            --exclude 'Data' \
            --exclude 'infra' \
            --exclude 'docker/signoz' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ env.VM_USER }}@${{ env.VM_HOST }}:/opt/projectfinance/

      - name: Build and restart
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.VM_USER }}@${{ env.VM_HOST }} << 'EOF'
            cd /opt/projectfinance
            docker compose -f docker-compose.prod.yml build web
            docker compose -f docker-compose.prod.yml up -d
          EOF
