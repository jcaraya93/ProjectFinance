{% extends "core/base.html" %}
{% block title %}Upload Statement — Project Finance{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">

    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">Import Bank Statements</h5>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label for="file-input" class="form-label">CSV Files</label>
          <input type="file" id="file-input" class="form-control" accept=".csv" multiple>
          <div class="form-text">Select one or more CSV statement files. File type (credit/debit) is auto-detected.</div>
        </div>

        <button id="import-btn" class="btn btn-primary w-100" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-upload me-1" viewBox="0 0 16 16">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
            <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
          </svg>
          Import Statements
        </button>

        <!-- Progress -->
        <div id="progress-section" class="mt-4 d-none">
          <div class="d-flex justify-content-between mb-1">
            <span id="progress-label" class="small text-muted">Importing...</span>
            <span id="progress-count" class="small text-muted"></span>
          </div>
          <div class="progress mb-3" style="height: 8px;">
            <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
          </div>
        </div>

        <!-- Results -->
        <div id="results" class="mt-3"></div>

        <!-- Summary -->
        <div id="summary" class="mt-3 d-none">
          <hr>
          <div id="summary-content" class="d-flex justify-content-between align-items-center">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
  const fileInput = document.getElementById('file-input');
  const importBtn = document.getElementById('import-btn');
  const progressSection = document.getElementById('progress-section');
  const progressBar = document.getElementById('progress-bar');
  const progressLabel = document.getElementById('progress-label');
  const progressCount = document.getElementById('progress-count');
  const results = document.getElementById('results');
  const summary = document.getElementById('summary');
  const summaryContent = document.getElementById('summary-content');
  const csrfToken = '{{ csrf_token }}';
  const uploadUrl = '{% url "core:upload_file_api" %}';

  fileInput.addEventListener('change', () => {
    importBtn.disabled = fileInput.files.length === 0;
    results.innerHTML = '';
    summary.classList.add('d-none');
    progressSection.classList.add('d-none');
  });

  importBtn.addEventListener('click', async () => {
    const files = Array.from(fileInput.files);
    if (!files.length) return;

    importBtn.disabled = true;
    fileInput.disabled = true;
    progressSection.classList.remove('d-none');
    results.innerHTML = '';
    summary.classList.add('d-none');

    let imported = 0, skipped = 0, failed = 0, totalTxns = 0;

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const pct = Math.round(((i) / files.length) * 100);
      progressBar.style.width = pct + '%';
      progressLabel.textContent = `Importing ${file.name}...`;
      progressCount.textContent = `${i + 1} / ${files.length}`;

      // Add a pending row
      const row = document.createElement('div');
      row.className = 'alert alert-light py-2 px-3 mb-2 d-flex align-items-center';
      row.innerHTML = `
        <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
        <span class="fw-semibold">${file.name}</span>
        <span class="ms-auto text-muted small">importing...</span>`;
      results.appendChild(row);

      try {
        const formData = new FormData();
        formData.append('file', file);

        const resp = await fetch(uploadUrl, {
          method: 'POST',
          headers: { 'X-CSRFToken': csrfToken },
          body: formData,
        });

        const data = await resp.json();

        if (!resp.ok) {
          row.className = 'alert alert-danger py-2 px-3 mb-2';
          row.innerHTML = `<span class="fw-semibold">${file.name}</span>
            <span class="ms-auto text-danger small">${data.error || 'Import failed'}</span>`;
          failed++;
        } else if (data.status === 'skipped') {
          const reason = data.reason === 'duplicate' ? 'Already imported' : 'No transactions';
          row.className = 'alert alert-warning py-2 px-3 mb-2';
          row.innerHTML = `<span class="fw-semibold">${file.name}</span>
            <span class="ms-auto text-warning small">${reason}</span>`;
          skipped++;
        } else {
          row.className = 'alert alert-success py-2 px-3 mb-2';
          const warnings = data.warnings && data.warnings.length
            ? `<br><small class="text-warning">${data.warnings.join('<br>')}</small>` : '';
          row.innerHTML = `<span class="fw-semibold">${file.name}</span>
            <span class="ms-auto text-success small">
              ${data.transaction_count} txns · ${data.classified_count} classified · ${data.elapsed_ms}ms
            </span>${warnings}`;
          imported++;
          totalTxns += data.transaction_count;
        }
      } catch (err) {
        row.className = 'alert alert-danger py-2 px-3 mb-2';
        row.innerHTML = `<span class="fw-semibold">${file.name}</span>
          <span class="ms-auto text-danger small">Network error</span>`;
        failed++;
      }
    }

    // Done
    progressBar.style.width = '100%';
    progressBar.classList.add(failed ? 'bg-warning' : 'bg-success');
    progressLabel.textContent = 'Done!';

    summary.classList.remove('d-none');
    summaryContent.innerHTML = `
      <div>
        <strong>${totalTxns}</strong> transactions from <strong>${imported}</strong> file${imported !== 1 ? 's' : ''}
        ${skipped ? ` · ${skipped} skipped` : ''}
        ${failed ? ` · <span class="text-danger">${failed} failed</span>` : ''}
      </div>
      <a href="{% url 'core:statement_list' %}" class="btn btn-sm btn-outline-primary">
        View Statements →
      </a>`;

    fileInput.disabled = false;
    fileInput.value = '';
    importBtn.disabled = true;
  });
})();
</script>
{% endblock %}
