services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: projectfinance
      POSTGRES_USER: projectfinance
      POSTGRES_PASSWORD: projectfinance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectfinance"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
